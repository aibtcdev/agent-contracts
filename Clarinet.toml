[project]
name = "agent-contracts"
description = ""
authors = []
telemetry = false
cache_dir = "./.cache"

# External contracts loaded by clarinet
[[project.requirements]]
contract_id = 'SP3FBR2AGK5H9QBDH3EEN6DF8EK8JY7RX8QJ5SVTE.sip-010-trait-ft-standard'

# Trait contracts (must be listed first for dependencies)
[contracts.dao-traits]
path = "contracts/traits/dao-traits.clar"
epoch = "3.0"

[contracts.agent-traits]
path = "contracts/traits/agent-traits.clar"
epoch = "3.0"

# DAO contracts (depend on traits)
[contracts.base-dao]
path = "contracts/dao/base-dao.clar"
epoch = "3.0"

# Token contracts (depend on DAO for governance)
[contracts.mock-sbtc]
path = "contracts/token/mock-sbtc.clar"
epoch = "3.0"

[contracts.dao-token]
path = "contracts/token/dao-token.clar"
epoch = "3.0"

# Extension contracts (depend on base-dao)
[contracts.dao-treasury]
path = "contracts/extensions/dao-treasury.clar"
epoch = "3.0"

[contracts.dao-epoch]
path = "contracts/extensions/dao-epoch.clar"
epoch = "3.0"

[contracts.dao-charter]
path = "contracts/extensions/dao-charter.clar"
epoch = "3.0"

[contracts.dao-token-owner]
path = "contracts/extensions/dao-token-owner.clar"
epoch = "3.0"

[contracts.core-proposals]
path = "contracts/extensions/core-proposals.clar"
epoch = "3.0"

# Proposal contracts
[contracts.test-proposal]
path = "contracts/proposals/test-proposal.clar"
epoch = "3.0"

[contracts.init-proposal]
path = "contracts/proposals/init-proposal.clar"
epoch = "3.0"

# Agent contracts (depend on base-dao)
[contracts.agent-registry]
path = "contracts/agent/agent-registry.clar"
epoch = "3.0"

[contracts.agent-account]
path = "contracts/agent/agent-account.clar"
epoch = "3.0"

[contracts.checkin-registry]
path = "contracts/checkin-registry.clar"
epoch = "3.0"

[contracts.proof-registry]
path = "contracts/proof-registry.clar"
epoch = "3.0"

[contracts.manifesto]
path = "contracts/manifesto.clar"
epoch = "3.0"

# Core contracts (independent multisig)
[contracts.dao-run-cost]
path = "contracts/core/dao-run-cost.clar"
epoch = "3.0"

# [contracts.counter]
# path = "contracts/counter.clar"
# epoch = "latest"

[repl.analysis]
passes = ["check_checker"]
check_checker = { trusted_sender = false, trusted_caller = false, callee_filter = false }

# Check-checker settings:
# trusted_sender: if true, inputs are trusted after tx_sender has been checked.
# trusted_caller: if true, inputs are trusted after contract-caller has been checked.
# callee_filter: if true, untrusted data may be passed into a private function without a
# warning, if it gets checked inside. This check will also propagate up to the
# caller.
# More informations: https://www.hiro.so/blog/new-safety-checks-in-clarinet
